	<script>
  function centralizarColunaSeForAtivo() {
    const tabela = document.getElementById('tabelaLocalizar');
    if (!tabela) return;

    const cabecalhos = tabela.querySelectorAll('thead th');
    let indiceAtivo = -1;

    // Procura a coluna com texto "Ativo"
    cabecalhos.forEach((th, index) => {
      if (th.textContent.trim().toLowerCase() === 'ativo') {
        indiceAtivo = index;
      }
    });

    // Se encontrou a coluna "Ativo"
    if (indiceAtivo !== -1) {
      const linhas = tabela.querySelectorAll('tr');
      linhas.forEach((linha) => {
        const celula = linha.children[indiceAtivo];
        if (celula) {
          celula.style.textAlign = 'center';
        }
      });
    }
  }

  // Chamada inicial
  centralizarColunaSeForAtivo();

  // Reaplica ao alterar a tabela
  const alvo = document.getElementById('CorpoTabela');
  if (alvo) {
    const observador = new MutationObserver(() => {
      centralizarColunaSeForAtivo();
    });

    observador.observe(alvo, {
      childList: true,
      subtree: true,
    });
  }
</script>
