# Banco vetorial separado do MySQL operacional (Villa Real).
#
# Subir:
#   docker compose -f docker-compose.rag-pgvector.yml up -d
#
# DATABASE_URL (scripts/processo_rag/.env.example):
#   postgresql://rag:rag@localhost:5433/processo_rag

services:
  rag-db:
    image: pgvector/pgvector:pg16
    container_name: vilareal-rag-db
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: processo_rag
    ports:
      - "5433:5432"
    volumes:
      - vilareal_rag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d processo_rag"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  vilareal_rag_pg_data:
