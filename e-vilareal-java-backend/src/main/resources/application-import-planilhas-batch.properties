# Job: pessoas (.xls) → import clientes (.xlsx) → imoveis (.xlsx); sem servlet.
spring.main.web-application-type=none

vilareal.import.batch.enabled=${VILAREAL_IMPORT_BATCH_ENABLED:false}
vilareal.import.batch.path-pessoas=${VILAREAL_IMPORT_BATCH_PATH_PESSOAS:}
vilareal.import.batch.path-clientes=${VILAREAL_IMPORT_BATCH_PATH_CLIENTES:}
vilareal.import.batch.path-imoveis=${VILAREAL_IMPORT_BATCH_PATH_IMOVEIS:}
vilareal.import.batch.pessoas-dry-run=${VILAREAL_IMPORT_BATCH_PESSOAS_DRY_RUN:false}
vilareal.import.batch.pessoas-report-path=${VILAREAL_IMPORT_BATCH_PESSOAS_REPORT_PATH:import-pessoas-batch-report.csv}
