# Por defeito: MySQL na VPS via túnel SSH (localhost:3308). Password via ambiente (não commitar).
spring.datasource.url=jdbc:mysql://127.0.0.1:3308/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:villareal_remote}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.flyway.repair-on-migrate=true
# V11 é Java (mojibake); bases com V12+ sem V11 precisam aplicar fora de ordem.
spring.flyway.out-of-order=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.br.com.vilareal=DEBUG

vilareal.security.permit-all-requests=false
