# Profile DEV — MySQL em localhost:3306, utilizador root/root (ver README «Como rodar localmente»).
#
# Se o login no front mostrar: «CannotCreateTransactionException … /api/auth/login»,
# o Spring não conseguiu ligar ao MySQL (serviço parado, porta errada ou credenciais).
# - MySQL só no backend: `cd e-vilareal-java-backend && docker compose up -d` (expõe 3306).
# - Stack raiz com DB local: `docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d`
#   → MySQL no host está na porta 3307; ao correr a API na máquina (não no container), exporte:
#   SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3307/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
#
# Túnel VPS / outro host: sobrescreva SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=jdbc:mysql://localhost:3306/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Swagger habilitado em dev
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.repair-on-migrate=true
# V11 é Java (mojibake); bases com V12+ sem V11 precisam aplicar fora de ordem.
spring.flyway.out-of-order=true

logging.level.br.com.vilareal=DEBUG

vilareal.security.permit-all-requests=false
