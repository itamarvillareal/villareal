# Repair explícito antes do migrate: ver FlywayDevConfig (profile dev).
spring.flyway.repair-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.br.com.vilareal=DEBUG

# Entrada no sistema sem JWT em desenvolvimento
vilareal.security.permit-all-requests=true
