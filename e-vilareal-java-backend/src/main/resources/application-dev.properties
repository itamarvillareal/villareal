# Profile DEV — MySQL local oficial: container `vilareal-db` (raiz do monorepo), host porta 3307.
#
# Subir o banco:
#   docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d db
#
# Dump / restore: ver comentários em `docker-compose.local-db.yml` na raiz.
# Se o login falhar com CannotCreateTransactionException, o MySQL não está acessível nesta porta.

spring.datasource.url=jdbc:mysql://localhost:3307/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Swagger habilitado em dev
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.repair-on-migrate=false
# V11 é Java (mojibake); bases com V12+ sem V11 precisam aplicar fora de ordem.
spring.flyway.out-of-order=true
# V57 e outras migrações antigas podem existir só no histórico do banco local.
spring.flyway.ignore-migration-patterns=*:missing

logging.level.br.com.vilareal=DEBUG

vilareal.security.permit-all-requests=false

# Claude API — use variável de ambiente ANTHROPIC_API_KEY (não commitar chave aqui)
# anthropic.api.key=sk-ant-...

# Gmail OAuth — tokens locais no Mac (produção usa /home/vilareal/gmail-tokens em application.properties)
gmail.tokens.directory=/Users/itamar/gmail-tokens
# Cookies de sessão PROJUDI persistidos localmente (reaproveitamento entre reinicializações).
projudi.session.store-dir=/Users/itamar/projudi-sessions
projudi.peticao.store-dir=/Users/itamar/projudi-peticoes
# Chave AES do cofre (32 bytes Base64) — arquivo gitignored; ver scripts/run-dev.sh e projudi-recadastrar-credencial.sh
projudi.cred.key-file=.projudi-cred-key.local
# Chave AES do cofre TOTP (32 bytes Base64) — arquivo gitignored; pode reutilizar a mesma chave do PROJUDI em dev.
app.totp.encryption-key-file=.totp-encryption-key.local
# Impersonação Drive em dev — arquivo gitignored; ver scripts/run-dev.sh
# export GOOGLE_DRIVE_IMPERSONATE_USER=itamar.villareal@villarealadvocacia.adv.br
# ou grave em .google-drive-impersonate.local (carregado automaticamente pelo run-dev.sh)

# WhatsApp — dev local (validação de assinatura desligada; tokens via env em produção)
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:villareal-verify-token-dev}
whatsapp.validate-signature=false

# Pipeline Movimentações Email — desligado em dev local para não competir com protocolo manual no PROJUDI
vilareal.email.projudi.pipeline.enabled=false

# Assistente IA Júlia — credencial de serviço (login navegador bloqueado via permite_login=false)
julia.assistente.login=julia.assistente
# Senha dev da migration V83: julia-dev-servico (rotacionar em produção)

# PJe TRT18 — botão cópia integral no acervo-geral (captura pje-clicks.json)
app.pje.trt18.copia-integral-button-selector=button[aria-label^="Detalhes do Processo"]

# Disparo automático PJe por e-mail TRT (desligado em dev por padrão)
pje.email-trigger.enabled=false

pje.trt18.login-padrao=00733235190