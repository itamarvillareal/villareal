# Profile DEV — MySQL com dados financeiros (V41–V47, ~67k lançamentos) em localhost:3306 (vilareal-local-db).
#
# Se o login no front mostrar: «CannotCreateTransactionException … /api/auth/login»,
# o Spring não conseguiu ligar ao MySQL (serviço parado, porta errada ou credenciais).
# - Dados completos: container `vilareal-local-db` → host porta 3306.
# - Schema vazio (Flyway do zero): container `vilareal-db` → host porta 3307
#   (`cd e-vilareal-java-backend && docker compose up -d`).
#
# Túnel VPS / outro host: sobrescreva SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=jdbc:mysql://localhost:3306/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Swagger habilitado em dev
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.repair-on-migrate=true
# V11 é Java (mojibake); bases com V12+ sem V11 precisam aplicar fora de ordem.
spring.flyway.out-of-order=true

logging.level.br.com.vilareal=DEBUG

vilareal.security.permit-all-requests=false
