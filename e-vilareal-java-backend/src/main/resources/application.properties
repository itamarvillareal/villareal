spring.application.name=vilareal-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

spring.datasource.url=jdbc:mysql://localhost:3306/vilareal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.web.pageable.max-page-size=500
spring.data.web.pageable.default-page-size=20

# Planilhas grandes (complementares processos, imóveis, import clientes, etc.)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:br/com/vilareal/db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Importação planilha "Informacoes de processos.xls" (vazio = ${user.home}/Documents/Informacoes de processos.xls)
vilareal.import.informacoes-processos.path=

# «Dados complementares processos» A–L (vazio = ${user.home}/Dropbox/COMUM/Dados Complentares Processos.xlsx)
vilareal.import.complementares-processos.path=

# Leitura Pasta1.xls — col. A cliente, col. B id pessoa (vazio = ${user.home}/Documents/Pasta1.xls)
vilareal.import.pasta1-clientes.path=

# Importação imóveis: export Administração Itamar (.xls) ou imoveis.xlsx canónico. Job CLI: vilareal.import.imoveis-planilha.job.enabled=true
vilareal.import.imoveis-planilha.path=${user.home}/Dropbox/sistema/Villa Real - Administração de Imóveis - Itamar.xls
vilareal.import.imoveis-planilha.job.enabled=false

# Importação Cadastro Pessoas (.xls) — vilareal.import.pessoas.enabled=true (exclui-se quando vilareal.import.batch.enabled=true)
# Path com espaços: use env VILAREAL_IMPORT_PESSOAS_PATH="..." (ver README); evite vírgulas em spring-boot.run.arguments
vilareal.import.pessoas.enabled=false
vilareal.import.pessoas.path=
vilareal.import.pessoas.dry-run=true
vilareal.import.pessoas.report-path=import-pessoas-report.csv
vilareal.import.pessoas.limit=0
vilareal.import.pessoas.header-row=9
vilareal.import.pessoas.first-data-row=11
vilareal.import.pessoas.update-existing=false
vilareal.import.pessoas.reconcile-by-cpf-when-id-missing=false
# Sufixo concatenado a pessoa / pessoa_complementar / pessoa_endereco / pessoa_contato (ex.: _nova). Vazio = tabelas atuais.
vilareal.import.pessoas.table-suffix=

# Anexos do módulo Pagamentos (boletos / comprovantes)
vilareal.pagamentos.storage-dir=${VILAREAL_PAGAMENTOS_DIR:${java.io.tmpdir}/vilareal-pagamentos}

# JWT (override in prod)
vilareal.security.jwt.secret=${JWT_SECRET:dev-secret-change-me-min-32-chars-long!!}
vilareal.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# true = API sem JWT (apenas dev/local; em prod deve ser false)
vilareal.security.permit-all-requests=${VILAREAL_SECURITY_PERMIT_ALL:false}

# Swagger apenas em dev (SpringDoc)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Planilha «import clientes.xlsx» (A–R) — mapa cliente+processos (vazio = ${user.home}/Documents/import clientes.xlsx)
vilareal.import.clientes-planilha.path=
# Job CLI: true executa e encerra a JVM (desativado quando vilareal.import.batch.enabled=true)
vilareal.import.clientes-planilha.job.enabled=false

# Lote: pessoas .xls → import clientes .xlsx → imoveis .xlsx (scripts/run-import-planilhas-batch.sh). Não ativar em conjunto com os jobs isolados.
vilareal.import.batch.enabled=false
vilareal.import.batch.path-pessoas=${VILAREAL_IMPORT_BATCH_PATH_PESSOAS:}
vilareal.import.batch.path-clientes=${VILAREAL_IMPORT_BATCH_PATH_CLIENTES:}
vilareal.import.batch.path-imoveis=${VILAREAL_IMPORT_BATCH_PATH_IMOVEIS:}
vilareal.import.batch.pessoas-dry-run=${VILAREAL_IMPORT_BATCH_PESSOAS_DRY_RUN:false}
vilareal.import.batch.pessoas-report-path=${VILAREAL_IMPORT_BATCH_PESSOAS_REPORT_PATH:import-pessoas-batch-report.csv}
vilareal.import.batch.pessoas-update-existing=${VILAREAL_IMPORT_BATCH_PESSOAS_UPDATE_EXISTING:false}
vilareal.import.batch.pessoas-reconcile-by-cpf-when-id-missing=${VILAREAL_IMPORT_BATCH_PESSOAS_RECONCILE_BY_CPF:false}

# DataJud / CNJ — proxy em /api/integrations/datajud (API key só no servidor; evita /datajud-proxy no nginx)
vilareal.datajud.base-url=${DATAJUD_BASE_URL:https://api-publica.datajud.cnj.jus.br}
vilareal.datajud.api-key=${DATAJUD_API_KEY:}

# Claude API (Anthropic) — defina ANTHROPIC_API_KEY no ambiente ou em application-dev.properties
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-sonnet-4-6
anthropic.api.max-tokens=8000
anthropic.api.timeout-seconds=120
anthropic.api.max-retries=3

# Google Drive — credenciais em classpath:google-drive-credentials.json (não commitar)
google.drive.credentials-file=classpath:google-drive-credentials.json
google.drive.root-folder-name=Sistema VilaReal
# Pasta raiz fixada por ID (Meu Drive de itamar.villareal). Evita ambiguidade de pastas homônimas
# e impede a criação de novas pastas "Sistema VilaReal" a cada inicialização.
google.drive.root-folder-id=1TE5a0t0ur5EWRszj_IBjS0eXSNPHF_F-
# Subpasta base dos clientes dentro da raiz (ex.: clientes/01 - Ativos). Vazio = usa a raiz.
google.drive.clientes-path=clientes/01 - Ativos

# Gmail API — OAuth2 (credentials.json do Google Cloud Console; não commitar)
gmail.credentials.path=classpath:credentials.json
gmail.tokens.directory=/home/vilareal/gmail-tokens
gmail.user=me

# WhatsApp Business Cloud API (Meta Graph API v25.0)
whatsapp.api-url=https://graph.facebook.com/v25.0
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:123456789}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:token-placeholder}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:villareal-verify-token-dev}
whatsapp.waba-id=${WHATSAPP_WABA_ID:000000000}
whatsapp.app-secret=${WHATSAPP_APP_SECRET:secret-placeholder}
whatsapp.validate-signature=false

# Lembretes automáticos de audiência (WhatsApp)
whatsapp.reminder.enabled=true
whatsapp.reminder.days-ahead=3
whatsapp.reminder.cron=0 0 7 * * MON-FRI
whatsapp.reminder.reforco-enabled=true
whatsapp.reminder.reforco-cron=0 0 18 * * MON-FRI

# Jobs CLI: use spring.main.web-application-type=none na JVM para não ocupar a porta 8080 (ver scripts run-import-*.sh).
