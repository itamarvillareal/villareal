spring.application.name=vilareal-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=jdbc:mysql://localhost:3306/vilareal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:br/com/vilareal/db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Importação planilha "Informacoes de processos.xls" (vazio = ${user.home}/Documents/Informacoes de processos.xls)
vilareal.import.informacoes-processos.path=

# Leitura Pasta1.xls — col. A cliente, col. B id pessoa (vazio = ${user.home}/Documents/Pasta1.xls)
vilareal.import.pasta1-clientes.path=

# JWT (override in prod)
vilareal.security.jwt.secret=${JWT_SECRET:dev-secret-change-me-min-32-chars-long!!}
vilareal.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# true = API sem JWT (apenas dev/local; em prod deve ser false)
vilareal.security.permit-all-requests=${VILAREAL_SECURITY_PERMIT_ALL:false}

# Swagger apenas em dev (SpringDoc)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
