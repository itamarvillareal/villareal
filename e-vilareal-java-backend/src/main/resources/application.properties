spring.application.name=VilaReal

# MySQL - localhost porta padrão 3306
spring.datasource.url=jdbc:mysql://localhost:3306/cadastro_pessoas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - schema gerenciado pelo Flyway (validate)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Swagger / OpenAPI (SpringDoc)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# DataJud API pública (CNJ) — monitoramento e publicações no backend
vilareal.datajud.base-url=https://api-publica.datajud.cnj.jus.br
vilareal.datajud.api-key=${DATAJUD_API_KEY:}
vilareal.monitoring.request-timeout-ms=28000
vilareal.monitoring.scheduler.fixed-delay-ms=60000
