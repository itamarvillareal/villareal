spring.application.name=vilareal-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vilareal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# JWT (override in prod)
vilareal.security.jwt.secret=${JWT_SECRET:dev-secret-change-me-min-32-chars-long!!}
vilareal.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Swagger apenas em dev (SpringDoc)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
