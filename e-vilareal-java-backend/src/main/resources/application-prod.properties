springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
logging.level.br.com.vilareal=INFO
server.forward-headers-strategy=native

gmail.credentials.path=classpath:credentials.json
gmail.tokens.directory=/home/vilareal/gmail-tokens
gmail.user=me

# WhatsApp — produção (credenciais via variáveis de ambiente na VPS)
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:villareal-verify-token-prod}
whatsapp.validate-signature=${WHATSAPP_VALIDATE_SIGNATURE:true}
