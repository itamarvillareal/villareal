springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
logging.level.br.com.vilareal=INFO
server.forward-headers-strategy=native

# Flyway ESTRITO em produção (explícito, não confiar só no default): numa falha, PARAR e mostrar,
# nunca auto-mascarar. Diferente do perfil dev (application-dev.properties), que liga ambos.
# - repair-on-migrate OFF: não reescreve checksums nem limpa migrações falhas automaticamente no boot.
# - out-of-order OFF: migração fora de ordem é erro (garante reprodutibilidade).
spring.flyway.repair-on-migrate=false
spring.flyway.out-of-order=false

gmail.credentials.path=classpath:credentials.json
gmail.tokens.directory=/home/vilareal/gmail-tokens
gmail.user=me

# Pipeline Movimentações Email (Gmail PROJUDI + Drive progressivo; perfis noturno/comercial/fim de semana)
vilareal.email.projudi.pipeline.enabled=true

# Varredura PROJUDI de monitoramento de pessoas — 5x/dia (cron em application.properties)
vilareal.projudi.varredura.enabled=true

# Backfill: PDF consolidado para processos Projudi 2026 com acervo integral completo.
# Pode permanecer ligado — após job SUCCESS no banco, o startup não reexecuta.
vilareal.processo.movimentacoes.consolidado.backfill.disparar-ano-no-startup=${VILAREAL_CONSOLIDADO_BACKFILL_ANO:2026}

# WhatsApp Cloud API (produção — credenciais via variáveis de ambiente na VPS)
whatsapp.api-url=https://graph.facebook.com/v25.0
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.waba-id=${WHATSAPP_WABA_ID}
whatsapp.app-secret=${WHATSAPP_APP_SECRET}
whatsapp.validate-signature=${WHATSAPP_VALIDATE_SIGNATURE:true}
whatsapp.reminder.enabled=true
whatsapp.reminder.days-ahead=3
whatsapp.reminder.cron=0 0 7 * * MON-FRI
whatsapp.reminder.reforco-enabled=true
whatsapp.reminder.reforco-cron=0 0 18 * * MON-FRI
whatsapp.aniversario.enabled=true
whatsapp.aniversario.cron=0 0 8 * * *

# Importação automática extrato Cora via Gmail (OFX em anexo)
cora.extrato.email.intervalo-ms=1800000

# Cora Integração Direta (mTLS) — habilitar via CORA_ENABLED=true na VPS
cora.enabled=${CORA_ENABLED:false}
cora.client-id=${CORA_CLIENT_ID:}
cora.cert-path=${CORA_CERT_PATH:}
cora.key-path=${CORA_KEY_PATH:}
cora.base-url=${CORA_BASE_URL:https://matls-clients.api.stage.cora.com.br}
