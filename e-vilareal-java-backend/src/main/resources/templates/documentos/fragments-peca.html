<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Fragmentos da peça</title>
</head>
<body>

<!--
  Fragmentos reutilizáveis copiados do peticao-base.html para manter aparência idêntica:
  cabeçalho institucional (logo + advogado + OAB), rodapé (endereço/telefones/e-mail) e o
  bloco de estilo base (A4, margens, fonte, cabeçalho na 1ª página, numeração a partir da 2ª).
  Variáveis injetadas por DocumentoPdfService.gerarPdfDeTemplate: logoCabecalhoBase64,
  rodapePrimeiraHtml, rodapeCorridoHtml, advogadoNome, advogadoOab.
-->

<th:block th:fragment="estiloBase">
    <style type="text/css">
        @page {
            size: A4;
            margin: 28mm 15mm 15mm 15mm;
            @top-center {
                content: element(cabecalho-padrao);
                vertical-align: top;
            }
            @bottom-center {
                content: element(rodape);
                vertical-align: bottom;
            }
        }

        @page :first {
            margin: 0 15mm 15mm 15mm;
            @top-center {
                content: none;
            }
            @bottom-center {
                content: element(rodape-primeira);
                vertical-align: bottom;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Arial Unicode MS", Arial, sans-serif;
            font-size: 12pt;
            line-height: 1.0;
            color: #000;
        }

        .cabecalho-primeira {
            width: 100%;
            padding-top: 3mm;
            margin-bottom: 15pt;
            margin-left: 0;
        }

        .cabecalho-padrao {
            position: running(cabecalho-padrao);
            width: 100%;
        }

        .cabecalho-layout {
            width: 100%;
            border-collapse: collapse;
            border: none;
        }

        .cabecalho-layout td {
            border: none;
            padding: 0;
            vertical-align: middle;
        }

        .cabecalho-logo {
            width: 35%;
            text-align: left;
        }

        .cabecalho-advogado {
            width: 65%;
            text-align: right;
        }

        .cabecalho-logo img {
            height: 2.3cm;
            width: 5.9cm;
            object-fit: contain;
        }

        .advogado-nome {
            font-family: "Lucida Calligraphy", "Lucida Handwriting", cursive;
            font-style: italic;
            font-weight: bold;
            font-size: 11pt;
            text-align: right;
            margin: 0;
            line-height: 1.2;
        }

        .advogado-oab {
            font-weight: bold;
            text-align: right;
            margin: 2pt 0 0 0;
            line-height: 1.0;
            font-size: 11pt;
        }

        .paginacao-direita {
            font-family: "Aldine401 BT", serif;
            text-align: right;
            margin: 0 0 4pt 0;
            font-size: 10pt;
            line-height: 1.0;
        }

        .pag-num-atual::before {
            content: counter(page);
            font-weight: bold;
        }

        .pag-num-total::before {
            content: counter(pages);
            font-weight: bold;
        }

        .rodape-primeira-running {
            position: running(rodape-primeira);
            width: 100%;
            text-align: center;
        }

        .rodape-running {
            position: running(rodape);
            width: 100%;
            text-align: center;
        }

        .rodape-linha1,
        .rodape-linha2 {
            font-family: "Courier New", Courier, monospace;
            font-size: 8pt;
            font-weight: bold;
            text-align: center;
            margin: 0;
            line-height: 1.0;
        }

        .rodape-linha3,
        .rodape-linha4 {
            font-family: Arial, sans-serif;
            font-size: 8pt;
            font-weight: normal;
            text-align: center;
            margin: 1pt 0 0 0;
            line-height: 1.0;
        }
    </style>
</th:block>

<th:block th:fragment="cabecalho">
    <div class="cabecalho-primeira">
        <table class="cabecalho-layout">
            <tr>
                <td class="cabecalho-logo">
                    <img th:if="${logoCabecalhoBase64 != null and !logoCabecalhoBase64.isEmpty()}"
                         th:src="${logoCabecalhoBase64}" alt="Villa Real e Advogados"/>
                </td>
                <td class="cabecalho-advogado">
                    <p class="advogado-nome" th:text="${advogadoNome}">Dr. Itamar Alexandre Felix Villa Real Junior</p>
                    <p class="advogado-oab" th:text="${advogadoOab}">OAB/GO 33.329</p>
                </td>
            </tr>
        </table>
    </div>

    <div class="cabecalho-padrao">
        <p class="paginacao-direita">
            <span class="pag-num-atual"></span> de <span class="pag-num-total"></span>
        </p>
        <table class="cabecalho-layout">
            <tr>
                <td class="cabecalho-logo">
                    <img th:if="${logoCabecalhoBase64 != null and !logoCabecalhoBase64.isEmpty()}"
                         th:src="${logoCabecalhoBase64}" alt="Villa Real e Advogados"/>
                </td>
                <td class="cabecalho-advogado">
                    <p class="advogado-nome" th:text="${advogadoNome}">Dr. Itamar Alexandre Felix Villa Real Junior</p>
                    <p class="advogado-oab" th:text="${advogadoOab}">OAB/GO 33.329</p>
                </td>
            </tr>
        </table>
    </div>
</th:block>

<th:block th:fragment="rodape">
    <div class="rodape-primeira-running" th:utext="${rodapePrimeiraHtml}"></div>

    <div class="rodape-running" th:utext="${rodapeCorridoHtml}"></div>
</th:block>

</body>
</html>
