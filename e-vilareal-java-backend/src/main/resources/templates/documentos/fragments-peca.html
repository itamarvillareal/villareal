<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Fragmentos da peça</title>
</head>
<body>

<!--
  Fragmentos reutilizáveis: timbrado (cabeçalho/rodapé), estilo de página e blocos HTML.
  Variáveis injetadas por DocumentoPdfService.gerarPdfDeTemplate: logoCabecalhoBase64,
  rodapePrimeiraHtml, rodapeCorridoHtml, advogadoNome, advogadoOab.
-->

<th:block th:fragment="estiloTimbrado">
    <style type="text/css">
        .cabecalho-primeira {
            width: 100%;
            padding-top: 3mm;
            margin-bottom: 15pt;
            margin-left: 0;
        }

        .cabecalho-padrao {
            position: running(cabecalho-padrao);
            width: 100%;
        }

        .cabecalho-layout {
            width: 100%;
            border-collapse: collapse;
            border: none;
        }

        .cabecalho-layout td {
            border: none;
            padding: 0;
            vertical-align: middle;
        }

        .cabecalho-logo {
            width: 35%;
            text-align: left;
        }

        .cabecalho-advogado {
            width: 65%;
            text-align: right;
            overflow: visible;
        }

        .advogado-bloco {
            display: inline-block;
            max-width: 100%;
            text-align: center;
            overflow: visible;
            padding-right: 3pt;
        }

        .cabecalho-logo img {
            height: 2.3cm;
            width: 5.9cm;
            object-fit: contain;
        }

        .advogado-nome {
            font-family: "Lucida Calligraphy", "Lucida Handwriting", cursive;
            font-style: italic;
            font-weight: bold;
            font-size: 11pt;
            text-align: right;
            margin: 0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: visible;
            padding-right: 2pt;
        }

        .advogado-oab {
            font-weight: bold;
            text-align: center;
            margin: 2pt 0 0 0;
            line-height: 1.21;
            font-size: 9.9pt;
            white-space: nowrap;
        }

        .paginacao-direita {
            font-family: "Aldine401 BT", serif;
            text-align: right;
            margin: 0 0 4pt 0;
            font-size: 10pt;
            line-height: 1.21;
        }

        .pag-num-atual::before {
            content: counter(page);
            font-weight: bold;
        }

        .pag-num-total::before {
            content: counter(pages);
            font-weight: bold;
        }

        .rodape-primeira-running {
            position: running(rodape-primeira);
            width: 100%;
            text-align: center;
        }

        .rodape-running {
            position: running(rodape);
            width: 100%;
            text-align: center;
        }

        .rodape-linha1,
        .rodape-linha2 {
            font-family: "Courier New", Courier, monospace;
            font-size: 8pt;
            font-weight: bold;
            text-align: center;
            margin: 0;
            line-height: 1.21;
        }

        .rodape-linha3,
        .rodape-linha4 {
            font-family: Arial, sans-serif;
            font-size: 8pt;
            font-weight: normal;
            text-align: center;
            margin: 1pt 0 0 0;
            line-height: 1.21;
        }

        .rodape-email {
            color: #0000ff;
            text-decoration: underline;
        }
    </style>
</th:block>

<th:block th:fragment="estiloCorpoPadrao">
    <style type="text/css">
        body {
            line-height: 1.21;
        }

        .corpo-documento,
        .corpo-documento .enderecamento,
        .corpo-documento .numero-processo,
        .corpo-documento .preambulo,
        .corpo-documento .corpo,
        .corpo-documento p.corpo,
        .corpo-documento .secao-conteudo p,
        .corpo-documento .citacao,
        .corpo-documento .citacao p,
        .corpo-documento .enumeracao,
        .corpo-documento .fecho,
        .corpo-documento .pedido-item,
        .corpo-documento .pedido-layout td,
        .corpo-documento .data,
        .corpo-documento .titulo-secao,
        .corpo-documento .nome-peca,
        .corpo-documento .titulo-principal,
        .corpo-documento .subtitulo,
        .corpo-documento .preambulo-rich p,
        .corpo-documento .qualificacao,
        .corpo-documento .qualificacao-parte,
        .corpo-documento p.qualificacao-parte,
        .corpo-documento .natureza-acao,
        .corpo-documento p.natureza-acao,
        .corpo-documento .titulo,
        .corpo-documento p.titulo,
        .corpo-documento p.subtitulo,
        .corpo-documento .alinea-debito,
        .corpo-documento p.alinea-debito,
        .corpo-documento .paragrafo,
        .corpo-documento p.paragrafo,
        .corpo-documento .recuado,
        .corpo-documento p.recuado,
        .corpo-documento .pedido,
        .corpo-documento p.pedido,
        .corpo-documento .fecho-termos,
        .corpo-documento p.fecho-termos,
        .corpo-documento .assinatura,
        .corpo-documento .assinatura p,
        .corpo-procuracao,
        .data-procuracao,
        .titulo-procuracao,
        .assinatura-outorgante,
        .contrato-texto,
        .contrato-preambulo,
        .contrato-clausula,
        .contrato-fecho,
        .contrato-data,
        .contrato-assinaturas,
        .contrato-assinaturas .nome {
            line-height: 1.21;
        }
    </style>
</th:block>

<!-- Espaço entre timbrado e corpo — petições (1ª página: padding; demais: margem @page). -->
<th:block th:fragment="estiloEspacoCabecalhoPeticao">
    <style type="text/css">
        .corpo-documento {
            padding-top: 0.5mm;
        }
    </style>
</th:block>

<th:block th:fragment="estiloBase">
    <th:block th:replace="~{documentos/fragments-peca :: estiloTimbrado}"/>
    <th:block th:replace="~{documentos/fragments-peca :: estiloCorpoPadrao}"/>
    <th:block th:replace="~{documentos/fragments-peca :: estiloEspacoCabecalhoPeticao}"/>
    <style type="text/css">
        @page {
            size: A4;
            margin: 28.5mm 15mm 15mm 15mm;
            @top-center {
                content: element(cabecalho-padrao);
                vertical-align: top;
            }
            @bottom-center {
                content: element(rodape);
                vertical-align: bottom;
            }
        }

        @page :first {
            margin: 0 15mm 15mm 15mm;
            @top-center {
                content: none;
            }
            @bottom-center {
                content: element(rodape-primeira);
                vertical-align: bottom;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Arial Unicode MS", Arial, sans-serif;
            font-size: 12pt;
            line-height: 1.21;
            color: #000;
        }

        p {
            margin: 0;
            padding: 0;
        }
    </style>
</th:block>

<th:block th:fragment="estiloContrato">
    <th:block th:replace="~{documentos/fragments-peca :: estiloTimbrado}"/>
    <th:block th:replace="~{documentos/fragments-peca :: estiloCorpoPadrao}"/>
    <style type="text/css">
        @page {
            size: A4;
            margin: 28mm 15mm 15mm 15mm;
            @top-center {
                content: element(cabecalho-padrao);
                vertical-align: top;
            }
            @bottom-center {
                content: element(rodape);
                vertical-align: bottom;
            }
        }

        @page :first {
            margin: 0 15mm 22mm 15mm;
            @top-center {
                content: none;
            }
            @bottom-center {
                content: element(rodape-primeira);
                vertical-align: bottom;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Arial Unicode MS", Arial, sans-serif;
            font-size: 9pt;
            line-height: 1.21;
            color: #000;
        }

        p {
            margin: 0;
            padding: 0;
        }

        .corpo-documento {
            margin-left: 0;
        }

        .contrato-texto {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            text-align: justify;
            text-align-last: justify;
            text-justify: inter-word;
            margin-top: 0;
            margin-bottom: 0;
            padding-left: 0;
            text-indent: 0;
        }

        .contrato-linha {
            display: block;
            text-align: justify;
            text-align-last: justify;
            text-justify: inter-word;
        }

        .contrato-preambulo,
        .contrato-fecho {
            padding-left: 0;
            text-indent: 0;
        }

        .contrato-preambulo {
            margin-bottom: 8pt;
        }

        .contrato-titulo {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 12pt;
            padding-left: 0;
            text-indent: 0;
        }

        .contrato-clausula {
            display: block;
            margin-bottom: 0;
            white-space: normal;
            padding-left: 0;
            text-indent: 0;
        }

        .contrato-clausula > .contrato-linha {
            display: block;
            text-align: justify;
            text-align-last: justify;
            text-justify: inter-word;
        }

        .contrato-clausula strong {
            font-weight: bold;
        }

        .contrato-clausula:last-of-type {
            margin-bottom: 0;
        }

        .contrato-link,
        .contrato-clausula a.contrato-link,
        .contrato-preambulo a.contrato-link,
        .contrato-fecho a.contrato-link {
            color: #0000ff;
            text-decoration: underline;
        }

        .contrato-fecho {
            margin-top: 12pt;
            margin-bottom: 0;
        }

        .contrato-data {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            text-align: center;
            padding-left: 0;
            text-indent: 0;
            margin-top: 36pt;
            margin-bottom: 36pt;
        }

        .contrato-assinaturas {
            width: 100%;
            border-collapse: collapse;
            border: none;
            margin-top: 12pt;
            font-family: Arial, sans-serif;
            font-size: 9pt;
        }

        .contrato-assinaturas td {
            border: none;
            width: 50%;
            vertical-align: top;
            text-align: center;
            padding: 0 8pt;
        }

        .contrato-assinaturas .linha {
            border-bottom: 1pt solid #000;
            height: 46.8pt;
            margin-bottom: 6pt;
        }

        .contrato-assinaturas tr + tr td {
            padding-top: 12pt;
        }

        .contrato-assinaturas .nome {
            font-weight: normal;
            text-transform: uppercase;
            line-height: 1.21;
            margin: 0;
        }

        .contrato-assinaturas .rotulo {
            margin-top: 0;
            font-size: 9pt;
            text-transform: uppercase;
        }

        .contrato-assinaturas .rotulo-testemunha {
            margin-top: 0;
            text-transform: none;
        }
    </style>
</th:block>

<th:block th:fragment="cabecalho">
    <div class="cabecalho-primeira">
        <table class="cabecalho-layout">
            <tr>
                <td class="cabecalho-logo">
                    <img th:if="${logoCabecalhoBase64 != null and !logoCabecalhoBase64.isEmpty()}"
                         th:src="${logoCabecalhoBase64}" alt="Villa Real e Advogados"/>
                </td>
                <td class="cabecalho-advogado">
                    <div class="advogado-bloco">
                        <p class="advogado-nome" th:text="${advogadoNome}">Dr. Itamar Alexandre Felix Villa Real Junior</p>
                        <p class="advogado-oab" th:text="${advogadoOab}">OAB/GO 33.329</p>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="cabecalho-padrao">
        <p class="paginacao-direita">
            <span class="pag-num-atual"></span> de <span class="pag-num-total"></span>
        </p>
        <table class="cabecalho-layout">
            <tr>
                <td class="cabecalho-logo">
                    <img th:if="${logoCabecalhoBase64 != null and !logoCabecalhoBase64.isEmpty()}"
                         th:src="${logoCabecalhoBase64}" alt="Villa Real e Advogados"/>
                </td>
                <td class="cabecalho-advogado">
                    <div class="advogado-bloco">
                        <p class="advogado-nome" th:text="${advogadoNome}">Dr. Itamar Alexandre Felix Villa Real Junior</p>
                        <p class="advogado-oab" th:text="${advogadoOab}">OAB/GO 33.329</p>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</th:block>

<th:block th:fragment="rodape">
    <div class="rodape-primeira-running" th:utext="${rodapePrimeiraHtml}"></div>

    <div class="rodape-running" th:utext="${rodapeCorridoHtml}"></div>
</th:block>

</body>
</html>
