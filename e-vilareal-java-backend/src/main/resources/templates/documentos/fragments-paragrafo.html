<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="runs(conteudo)">
    <th:block th:each="trecho : ${conteudo}">
        <strong th:if="${trecho.negrito && !trecho.italico}" th:text="${trecho.texto}">texto</strong>
        <em th:if="${trecho.italico && !trecho.negrito}" th:text="${trecho.texto}">texto</em>
        <strong th:if="${trecho.negrito && trecho.italico}"><em th:text="${trecho.texto}">texto</em></strong>
        <u th:if="${trecho.sublinhado && !trecho.negrito && !trecho.italico}" th:text="${trecho.texto}">texto</u>
        <mark th:if="${trecho.destacado && !trecho.negrito && !trecho.italico && !trecho.sublinhado}" th:text="${trecho.texto}">texto</mark>
        <span th:if="${!trecho.negrito && !trecho.italico && !trecho.sublinhado && !trecho.destacado}" th:text="${trecho.texto}">texto</span>
    </th:block>
</th:block>

<th:block th:fragment="paragrafo(paragrafo)">
    <div th:if="${paragrafo.tipo.name() == 'TABELA'}" class="doc-tabela-wrapper" th:utext="${paragrafo.conteudo[0].texto}"></div>
    <p th:unless="${paragrafo.tipo.name() == 'TABELA'}" th:class="${paragrafo.tipo.name() == 'ENUMERACAO' ? 'enumeracao' :
                   paragrafo.tipo.name() == 'FECHO' ? 'fecho' :
                   paragrafo.tipo.name() == 'CITACAO' ? 'citacao' :
                   paragrafo.tipo.name() == 'NOME_PECA' ? 'nome-peca' : 'corpo'}"
       th:attr="style=${paragrafo.estiloCss}">
        <th:block th:replace="~{documentos/fragments-paragrafo :: runs(${paragrafo.conteudo})}"/>
    </p>
</th:block>
</body>
</html>
