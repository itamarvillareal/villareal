<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Contrato de Locação</title>
    <th:block th:replace="~{documentos/fragments-peca :: estiloContrato}"/>
</head>
<body>

<th:block th:replace="~{documentos/fragments-peca :: cabecalho}"/>

<th:block th:replace="~{documentos/fragments-peca :: rodape}"/>

<div class="corpo-documento">
    <p class="contrato-texto contrato-titulo"
       th:if="${tituloContrato != null and !#strings.isEmpty(tituloContrato)}"
       th:text="${tituloContrato}">CONTRATO DE LOCAÇÃO</p>

    <div class="contrato-texto contrato-preambulo" th:utext="${preambuloHtml}">
        Pelo presente instrumento particular...
    </div>

    <div class="contrato-texto contrato-clausula"
       th:each="clausula : ${clausulas}"
       th:utext="${clausula}">
        Cláusula...
    </div>

    <div class="contrato-texto contrato-fecho" th:utext="${fechoHtml}">
        Para firmar e como prova...
    </div>

    <p class="contrato-data" th:text="${localData}">Anápolis, estado de Goiás, data.</p>

    <table class="contrato-assinaturas">
        <tr th:each="linha : ${linhasAssinatura}">
            <td th:if="${linha.centralizada == 'true'}" colspan="2">
                <div class="linha"></div>
                <p class="nome"><strong th:text="${linha.nomeEsquerda}">NOME</strong></p>
                <p class="rotulo" th:text="${linha.rotuloEsquerda}">Locador</p>
            </td>
            <td th:if="${linha.centralizada != 'true'}">
                <div class="linha"></div>
                <p class="nome"><strong th:text="${linha.nomeEsquerda}">NOME</strong></p>
                <p class="rotulo" th:text="${linha.rotuloEsquerda}">Locador</p>
            </td>
            <td th:if="${linha.centralizada != 'true' and linha.nomeDireita != null and !#strings.isEmpty(linha.nomeDireita)}">
                <div class="linha"></div>
                <p class="nome"><strong th:text="${linha.nomeDireita}">NOME</strong></p>
                <p class="rotulo" th:text="${linha.rotuloDireita}">Locatário</p>
            </td>
            <td th:if="${linha.centralizada != 'true' and (linha.nomeDireita == null or #strings.isEmpty(linha.nomeDireita))}"></td>
        </tr>
        <tr th:each="fi : ${fiadorAssinaturas}" th:if="${temFiadores}">
            <td th:if="${fi.centralizada == 'true'}" colspan="2">
                <div class="linha"></div>
                <p class="nome"><strong th:text="${fi.nomeEsquerda}">FIADOR</strong></p>
                <p class="rotulo" th:text="${fi.rotuloEsquerda}">Fiador</p>
            </td>
            <td th:if="${fi.centralizada != 'true'}">
                <div class="linha"></div>
                <p class="nome"><strong th:text="${fi.nomeEsquerda}">FIADOR</strong></p>
                <p class="rotulo" th:text="${fi.rotuloEsquerda}">Fiador</p>
            </td>
            <td th:if="${fi.centralizada != 'true' and fi.nomeDireita != null and !#strings.isEmpty(fi.nomeDireita)}">
                <div class="linha"></div>
                <p class="nome"><strong th:text="${fi.nomeDireita}">FIADOR</strong></p>
                <p class="rotulo" th:text="${fi.rotuloDireita}">Fiador</p>
            </td>
            <td th:if="${fi.centralizada != 'true' and (fi.nomeDireita == null or #strings.isEmpty(fi.nomeDireita))}"></td>
        </tr>
        <tr>
            <td>
                <div class="linha"></div>
                <p class="nome rotulo-testemunha">Testemunha</p>
            </td>
            <td>
                <div class="linha"></div>
                <p class="nome rotulo-testemunha">Testemunha</p>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
