# MySQL local oficial: monorepo na raiz — `docker-compose.local-db.yml` (container `vilareal-db`, host :3307).
#
# Subir só o banco:
#   cd .. && docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d db
#
# API em Docker (8081) + MySQL:
#   cd .. && docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d
#
# API com Maven no host (profile dev → localhost:3307):
#   ./scripts/run-dev.sh
#
# Não há serviço `mysql` neste ficheiro (evita segundo volume na porta 3306).

services: {}
