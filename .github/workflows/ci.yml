name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # Reactor a partir da raiz: o backend depende do módulo irmão assinatura-core
      # (br.com.vilareal:assinatura-core:1.0.0-SNAPSHOT), que não existe em repositório
      # remoto — rodar só dentro de e-vilareal-java-backend falha na resolução.
      - name: mvn test
        run: e-vilareal-java-backend/mvnw -B -pl e-vilareal-java-backend -am test
        env:
          CI: true
