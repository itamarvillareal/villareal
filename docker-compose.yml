# Stack VilaReal (API, front). MySQL local opcional: docker-compose.local-db.yml
#
# Banco oficial em dev: container vilareal-db (compose.local-db.yml), host localhost:3307.
# Dump:  docker exec vilareal-db mysqldump -u root -proot vilareal > vilareal-dump.sql
#        ./scripts/dump-db-local.sh
# Restore: ver cabeçalho de docker-compose.local-db.yml
#
# Sem MySQL local: backend usa túnel VPS (3308) via .env.docker — ver .env.docker.example

services:
  backend:
    build:
      context: ./e-vilareal-java-backend
      dockerfile: Dockerfile
    container_name: vilareal-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Variáveis VILLAREAL_COMPOSE_* vêm de `.env.docker` (evita colidir com um `.env` genérico na raiz).
      SPRING_DATASOURCE_URL: ${VILLAREAL_COMPOSE_JDBC_URL:-jdbc:mysql://host.docker.internal:3308/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${VILLAREAL_COMPOSE_JDBC_USER:-villareal_remote}
      SPRING_DATASOURCE_PASSWORD: ${VILLAREAL_COMPOSE_JDBC_PASSWORD:?Crie .env.docker a partir de .env.docker.example e defina VILLAREAL_COMPOSE_JDBC_PASSWORD}
      JWT_SECRET: dev-secret-change-me-min-32-chars-long!!
      GMAIL_TOKENS_DIRECTORY: /home/vilareal/gmail-tokens
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8080"
    volumes:
      - /Users/itamar/gmail-tokens:/home/vilareal/gmail-tokens
    # MySQL na VPS: mantém o túnel SSH local em 3308 (ex.: scripts/dev-up.sh).

  frontend:
    build:
      context: ./e-vilareal-react-web
      dockerfile: Dockerfile
    container_name: vilareal-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
