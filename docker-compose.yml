services:
  db:
    image: mysql:8.0.36
    container_name: vilareal-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vilareal
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./e-vilareal-java-backend/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./e-vilareal-java-backend
      dockerfile: Dockerfile
    container_name: vilareal-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/vilareal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: dev-secret-change-me-min-32-chars-long!!
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./e-vilareal-react-web
      dockerfile: Dockerfile
    container_name: vilareal-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
