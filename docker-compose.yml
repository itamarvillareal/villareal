# Stack VilaReal (API, front). MySQL local opcional: docker-compose.local-db.yml
#
# Banco oficial em dev: container vilareal-db (compose.local-db.yml), host localhost:3307.
# Sem MySQL local: backend usa túnel VPS (3308) via .env.docker — ver .env.docker.example

services:
  backend:
    build:
      context: ./e-vilareal-java-backend
      dockerfile: Dockerfile
    container_name: vilareal-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?defina ANTHROPIC_API_KEY no .env.docker}
      # Variáveis VILLAREAL_COMPOSE_* vêm de `.env.docker` (evita colidir com um `.env` genérico na raiz).
      SPRING_DATASOURCE_URL: ${VILLAREAL_COMPOSE_JDBC_URL:-jdbc:mysql://host.docker.internal:3308/vilareal?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${VILLAREAL_COMPOSE_JDBC_USER:-villareal_remote}
      SPRING_DATASOURCE_PASSWORD: ${VILLAREAL_COMPOSE_JDBC_PASSWORD:?Crie .env.docker a partir de .env.docker.example e defina VILLAREAL_COMPOSE_JDBC_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-min-32-chars-long!!}
      GMAIL_TOKENS_DIRECTORY: /home/vilareal/gmail-tokens
      GOOGLE_DRIVE_SHARED_DRIVE_ID: ${GOOGLE_DRIVE_SHARED_DRIVE_ID:-0ANU_zUd2tFQ7Uk9PVA}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:-}
      GOOGLE_DRIVE_IMPERSONATE_USER: ${GOOGLE_DRIVE_IMPERSONATE_USER:-}
      PROJUDI_CRED_KEY: ${PROJUDI_CRED_KEY:-}
      PROJUDI_ORQUESTRADOR_CREDENCIAL_ID: ${PROJUDI_ORQUESTRADOR_CREDENCIAL_ID:-1}
      # WhatsApp Cloud API — valores reais em `.env.docker` na VPS (ver WHATSAPP_SETUP.md)
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_WABA_ID: ${WHATSAPP_WABA_ID:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_VALIDATE_SIGNATURE: ${WHATSAPP_VALIDATE_SIGNATURE:-false}
      # Cora Integração Direta (mTLS) — certificados em volume; desligado por padrão
      CORA_ENABLED: ${CORA_ENABLED:-false}
      CORA_CLIENT_ID: ${CORA_CLIENT_ID:-}
      CORA_CERT_PATH: ${CORA_CERT_PATH:-/home/vilareal/cora-certs/certificate.pem}
      CORA_KEY_PATH: ${CORA_KEY_PATH:-/home/vilareal/cora-certs/private-key.pem}
      CORA_BASE_URL: ${CORA_BASE_URL:-https://matls-clients.api.stage.cora.com.br}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8080"
    volumes:
      - /home/vilareal/gmail-tokens:/home/vilareal/gmail-tokens
      - /home/vilareal/cora-certs:/home/vilareal/cora-certs:ro

  frontend:
    build:
      context: ./e-vilareal-react-web
      dockerfile: Dockerfile
    container_name: vilareal-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
