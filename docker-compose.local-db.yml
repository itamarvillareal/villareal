# MySQL local oficial para desenvolvimento (única instância no monorepo).
#
# Container: vilareal-db
# Host:      localhost:3307  (root / root, base vilareal)
# Volume:    villareal_db_data (nome explícito abaixo)
#
# Subir só o MySQL:
#   docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d db
#
# Stack completa (API :8081 + MySQL + front :5173):
#   docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d --build
#
# Dump:
#   docker exec vilareal-db mysqldump -u root -proot vilareal > vilareal-dump.sql
#   # ou: ./scripts/dump-db-local.sh
#
# Restore (apaga e recria a base):
#   docker exec vilareal-db mysql -u root -proot -e "DROP DATABASE IF EXISTS vilareal; CREATE DATABASE vilareal CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
#   docker exec -i vilareal-db mysql -u root -proot vilareal < vilareal-dump.sql
#
# Sync a partir da VPS: ./scripts/sync-db-local.sh
#
# Spring Boot no host (profile dev): application-dev.properties → localhost:3307
# API em Docker: JDBC interno jdbc:mysql://db:3306/... (serviço `db` nesta rede)

services:
  db:
    image: mysql:8.0.36
    container_name: vilareal-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vilareal
    ports:
      - "3307:3306"
    volumes:
      - villareal_db_data:/var/lib/mysql
      - ./e-vilareal-java-backend/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/vilareal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  villareal_db_data:
