# MySQL em Docker (opcional). Stack por defeito usa apenas o MySQL na VPS via túnel (3308).
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.local-db.yml up -d --build
#
services:
  db:
    image: mysql:8.0.36
    container_name: vilareal-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vilareal
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./e-vilareal-java-backend/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/vilareal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
